---
# yamllint disable rule:line-length rule:truthy
name: Build add-on

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ADDON: dnsdist

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.sanitize.outputs.version }}
      name: ${{ steps.info.outputs.name }}
      description: ${{ steps.info.outputs.description }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            ${{ env.ADDON }}/**/*.yaml
            ${{ env.ADDON }}/**/Dockerfile
            ${{ env.ADDON }}/rootfs/**

      - name: Check changed add-on
        id: changed
        run: |
          if [[ "${{ steps.changed_files.outputs.any_changed }}" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get add-on info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./${{ env.ADDON }}

      - name: Sanitize add-on info
        id: sanitize
        run: |
          version='${{ steps.info.outputs.version }}'
          version=${version//\"/}
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: hass-dnsdist
          registry-prefix: docker.io/sophiefox

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          container-registry: docker.io
          container-registry-username: sophiefox
          context: ./${{ env.ADDON }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          labels: |
            io.hass.type=addon
            io.hass.name=${{ needs.init.outputs.name }}
            io.hass.description=${{ needs.init.outputs.description }}
          push: ${{ github.event_name == 'push' }}
          version: ${{ needs.init.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    if: needs.init.outputs.changed == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.init.outputs.architectures }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          container-registry: docker.io
          container-registry-username: sophiefox
          image-name: hass-dnsdist
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          registry-prefix: docker.io/sophiefox

  comment:
    name: Comment on PR
    needs: [init, build]
    if: always() && github.event_name == 'pull_request' && needs.init.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const buildJobs = jobs.jobs.filter(job => job.name.includes('Build'));
            const successful = buildJobs.filter(job => job.conclusion === 'success').length;
            const failed = buildJobs.filter(job => job.conclusion === 'failure').length;
            const skipped = buildJobs.filter(job => job.conclusion === 'skipped').length;

            let body;
            if (failed > 0) {
              body = `## Build Results\n\n- Successful: ${successful}\n- Failed: ${failed}\n- Skipped: ${skipped}\n\nSome builds failed. Check the logs for details.`;
            } else {
              body = `## Build Results\n\n- Successful: ${successful}\n- Failed: ${failed}\n- Skipped: ${skipped}\n\nAll builds completed successfully!`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
