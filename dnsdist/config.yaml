---
version: 2.0.4
slug: dnsdist
name: DNSdist
description: dnsdist is a highly DNS-, DoS- and abuse-aware loadbalancer.
url: https://github.com/SharkyRawr/hass-dnsdist
advanced: true
arch:
  - aarch64
  - amd64
image: sophiefox/hass-dnsdist
init: false
map:
  - share
options:
  defaults:
    - 8.8.8.8
    - 8.8.4.4
  customize:
    active: false
    folder: dnsdist
  webserver:
    active: false
    password: "changeme"
    apikey: "changeme"
ports:
  53/tcp: 53
  53/udp: 53
  8083/tcp: 8083
  853/tcp: 853
schema:
  defaults:
    - str
  customize:
    active: bool
    folder: str
  webserver:
    active: bool
    password: str
    apikey: str
startup: system
